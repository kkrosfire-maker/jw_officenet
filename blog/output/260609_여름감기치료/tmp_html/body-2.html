<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; padding: 0; background: white; }
.clipboard-frame {
  width: 100%; height: 100%;
  background: white;
  padding: 44px 44px 32px;
  font-family: 'Noto Sans KR', '맑은 고딕', sans-serif;
  /* override가 display를 건드리지 않으므로 flex 중앙 정렬 가능 */
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.clip-wrapper {}
.inner-card { background: transparent; }

.badge {
  display: inline-block;
  background: #E86B5F; color: white;
  font-size: 26px; font-weight: 700;
  padding: 6px 18px; border-radius: 16px;
  margin-bottom: 10px;
}
.title { font-size: 44px; font-weight: 700; color: #1A2340; margin-bottom: 4px; }
.subtitle { font-size: 26px; color: #888; margin-bottom: 14px; }

.item {
  display: flex;
  align-items: flex-start;
  margin-bottom: 8px;
  background: #FFF7F6;
  border-left: 6px solid #E86B5F;
  border-radius: 0 8px 8px 0;
}
.item-icon {
  font-size: 32px;
  min-width: 64px;
  text-align: center;
  padding: 11px 0;
}
.item-text { padding: 10px 14px 10px 4px; }
.item-title { font-size: 29px; font-weight: 700; color: #1A2340; margin-bottom: 2px; }
.item-desc  { font-size: 24px; color: #555; line-height: 1.35; }
.warn {
  background: #FFF2F0;
  border: 1px solid #FFD0CC;
  border-radius: 8px;
  padding: 11px 18px;
  font-size: 24px; color: #C0392B;
  margin-top: 8px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="clipboard-frame">
  <div class="clip-wrapper"></div>
  <div class="inner-card">
    <div class="badge">증상 체크</div>
    <div class="title">여름감기 주요 증상</div>
    <div class="subtitle">2일 이상 지속되면 감기를 의심하세요</div>

    <div class="item">
      <div class="item-icon">🔴</div>
      <div class="item-text">
        <div class="item-title">인후통 (목 아픔)</div>
        <div class="item-desc">침 삼킬 때 따가운 느낌 — 첫 번째 신호</div>
      </div>
    </div>
    <div class="item">
      <div class="item-icon">🌡️</div>
      <div class="item-text">
        <div class="item-title">발열 38~39°C</div>
        <div class="item-desc">3일 이상 지속되면 병원 방문 필요</div>
      </div>
    </div>
    <div class="item">
      <div class="item-icon">💧</div>
      <div class="item-text">
        <div class="item-title">콧물·코막힘</div>
        <div class="item-desc">누런 콧물로 변하면 이차감염 가능성</div>
      </div>
    </div>
    <div class="item">
      <div class="item-icon">😮</div>
      <div class="item-text">
        <div class="item-title">기침·가래</div>
        <div class="item-desc">마른기침 → 가래 동반 기침으로 진행</div>
      </div>
    </div>
    <div class="item" style="margin-bottom:0;">
      <div class="item-icon">🤢</div>
      <div class="item-text">
        <div class="item-title">소화기 증상 (엔테로바이러스)</div>
        <div class="item-desc">구역, 식욕 저하, 복통, 설사 동반 가능</div>
      </div>
    </div>

    <div class="warn">⚠️ 냉방병과 달리 여름감기는 38°C 이상 발열 + 전염성 있음</div>
  </div>
</div>
</body>
</html>
