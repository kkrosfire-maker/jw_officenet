<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; }
  body { margin:0; padding:0; background:white;
         font-family:'Noto Sans KR','Malgun Gothic',sans-serif; }

  .clipboard-frame { width:1080px; background:white; }
  .clip-wrapper     { display:none; }

  /* inner-card: Grid 2행 — 제목(130px) + 스텝 영역(나머지) */
  .inner-card {
    display: grid;
    grid-template-rows: 130px 1fr;
    height: 808px;
    overflow: hidden;
  }

  /* ── 제목 ── */
  .title-bar {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  .label {
    background:#2155A3; color:white;
    font-size:28px; font-weight:700;
    padding:8px 32px; border-radius:30px;
  }
  .title-bar h2 {
    font-size:42px; font-weight:900;
    color:#1a1a2e; margin:0; line-height:1.2;
  }

  /* ── 스텝 영역: Grid 7행 (스텝4 + 화살표3) ── */
  .steps {
    display: grid;
    grid-template-rows: 1fr 28px 1fr 28px 1fr 28px 1fr;
    overflow: hidden;
  }

  .step {
    display: flex; align-items: center;
    gap: 24px; border-radius: 16px;
    padding: 0 28px;
    overflow: hidden;
  }
  .step-1 { background:#EEF3FF; }
  .step-2 { background:#FFF3EA; }
  .step-3 { background:#FFF0F0; }
  .step-4 { background:#EDFFF5; }

  .step-num {
    width:64px; height:64px; border-radius:50%;
    color:white; font-size:32px; font-weight:900;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .step-1 .step-num { background:#2155A3; }
  .step-2 .step-num { background:#E87D30; }
  .step-3 .step-num { background:#D94040; }
  .step-4 .step-num { background:#28A060; }

  .step-content { flex:1; min-width:0; }
  .step-main {
    font-size:32px; font-weight:700; color:#1a1a2e;
    line-height:1.2; margin-bottom:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .step-sub {
    font-size:24px; color:#555; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .arrow {
    display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#aaa;
  }
</style>
</head>
<body>
<div class="clipboard-frame">
  <div class="clip-wrapper"></div>
  <div class="inner-card">

    <div class="title-bar">
      <span class="label">메커니즘</span>
      <h2>열대야가 잠을 방해하는 이유</h2>
    </div>

    <div class="steps">

      <div class="step step-1">
        <div class="step-num">1</div>
        <div class="step-content">
          <div class="step-main">🌡️ 밤 기온 25도 이상 지속</div>
          <div class="step-sub">열대야 — 체온이 떨어지지 않는 환경</div>
        </div>
      </div>

      <div class="arrow">▼</div>

      <div class="step step-2">
        <div class="step-num">2</div>
        <div class="step-content">
          <div class="step-main">🔥 심부 체온 하강 실패</div>
          <div class="step-sub">정상 수면에 필요한 1~2도 하강 불가</div>
        </div>
      </div>

      <div class="arrow">▼</div>

      <div class="step step-3">
        <div class="step-num">3</div>
        <div class="step-content">
          <div class="step-main">🌙 멜라토닌 분비 억제</div>
          <div class="step-sub">수면 호르몬 생성이 늦어지고 줄어듦</div>
        </div>
      </div>

      <div class="arrow">▼</div>

      <div class="step step-4">
        <div class="step-num">4</div>
        <div class="step-content">
          <div class="step-main">😵 각성 상태 → 불면 지속</div>
          <div class="step-sub">잠들기 어렵고 자주 깨며 깊은 잠 불가</div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
